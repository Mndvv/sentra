<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Struktur Organisasi - OSIS Nawasena</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/struktur.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,100,1,200&"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <div class="logo">
                <a href="index.html">SENTRA<span>.</span></a>
            </div>

            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Beranda</a></li>
                <li><a href="struktur.html">Struktur</a></li>
                <li><a href="program.html">Program Kerja</a></li>
                <li><a href="dokumentasi.html">Dokumentasi</a></li>
                <li><a href="sponsor.html">Sponsorship</a></li>
                <li><a href="aurora.html">AURORA</a>
            </ul>

            <button id="dark-mode-toggle" class="btn-theme"><span
                    class="material-symbols-outlined">dark_mode</span></button>
        </div>
    </nav>

    <main class="container section-padding">
        <div class="section-header" style="margin-top: 4rem; text-align: center;">
            <h2>Struktur Organisasi</h2>
            <p>Kabinet Nawasena 2025/2026</p>
        </div>

        <div class="bento-grid" id="pengurus-inti-container">
            <!-- Diisi secara dinamis melalui API -->
        </div>

        <!-- Seksi Bidang -->
        <div class="sekbid-container">
            <h3 class="subsection-title">Seksi Bidang </h3>
            <div class="sekbid-grid" id="sekbid-list"></div>
        </div>
    </main>

    <!-- Modal Detail Pengurus -->
    <div id="pengurusModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Detail Pengurus</h2>
                <button class="close-modal" onclick="closePengurusModal()">&times;</button>
            </div>
            <div class="modal-body" id="pengurusModalBody">
                <!-- Konten akan diisi oleh JavaScript -->
            </div>
        </div>
    </div>

    <!-- Modal Detail Sekbid (tetap ada) -->
    <div id="sekbidModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="sekbidModalTitle">Detail Seksi Bidang</h2>
                <button class="close-modal" onclick="closeSekbidModal()">&times;</button>
            </div>
            <div class="modal-body" id="sekbidModalBody">
                <!-- Konten akan diisi oleh JavaScript -->
            </div>
        </div>
    </div>

    <div class="mini-player">
        <div class="player-info">
            <p class="track-name" style="font-weight: bold; font-size: 0.8rem;">Radio Nawasena</p>
            <div class="player-controls">
                <button class="btn-player" id="btn-play-pause" onclick="playPauseMusic()"><span
                        class="material-symbols-outlined">play_arrow</span></button>
                <button class="btn-player" onclick="nextMusic()"><span
                        class="material-symbols-outlined">skip_next</span></button>
            </div>
        </div>
        <audio id="audio-player"></audio>
    </div>

    <script src="js/api.js"></script>
    <script src="js/script.js"></script>
    <script src="js/struktur.js"></script>
</body>

</html>
